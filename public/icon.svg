<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background so the icon is safe to mask. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Candlestick mark centred within the ~80% safe zone. -->
  <g stroke="#ffffff" stroke-width="20" stroke-linecap="round" fill="#ffffff">
    <!-- left candle -->
    <line x1="176" y1="120" x2="176" y2="392"/>
    <rect x="150" y="200" width="52" height="120" rx="10" fill="#ffffff" stroke="none"/>
    <!-- right candle -->
    <line x1="336" y1="140" x2="336" y2="392"/>
    <rect x="310" y="240" width="52" height="120" rx="10" fill="#0b1020" stroke="#ffffff" stroke-width="14"/>
  </g>
</svg>
